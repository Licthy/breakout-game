<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f3460">
    <title>打砖块 - Breakout Game</title>
    <link rel="manifest" href="manifest.json">
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/breakout-game/sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful');
          })
          .catch(error => {
            console.log('ServiceWorker registration failed:', error);
          });
      }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        canvas {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: linear-gradient(180deg, #0f3460 0%, #1a1a2e 100%);
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .instructions {
            margin-top: 20px;
            opacity: 0.8;
            max-width: 600px;
            line-height: 1.6;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
        }

        .game-over h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .game-over p {
            margin-bottom: 20px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>打砖块</h1>
        <div class="stats">
            <div class="stat">分数: <span id="score">0</span></div>
            <div class="stat">生命: <span id="lives">3</span></div>
            <div class="stat">关卡: <span id="level">1</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <button onclick="startGame()">开始游戏</button>
            <button onclick="pauseGame()">暂停</button>
            <button onclick="resetGame()">重新开始</button>
        </div>
        <div class="instructions">
            <strong>操作说明：</strong><br>
            移动鼠标或左右方向键控制挡板 | 空格键发射球 | 避开底部，击碎所有砖块过关
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2 id="gameOverTitle">游戏结束</h2>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameState = 'waiting'; // waiting, playing, paused, gameover, win
        let score = 0;
        let lives = 3;
        let level = 1;

        // Paddle
        const paddle = {
            x: canvas.width / 2 - 50,
            y: canvas.height - 30,
            width: 100,
            height: 15,
            speed: 8,
            dx: 0
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            radius: 8,
            speed: 5,
            dx: 4,
            dy: -4
        };

        // Bricks
        const brickConfig = {
            rows: 5,
            cols: 10,
            width: 70,
            height: 20,
            padding: 5,
            offsetTop: 50,
            offsetLeft: 35
        };

        let bricks = [];

        // Colors for different rows
        const brickColors = [
            '#ff6b6b', // red
            '#feca57', // yellow
            '#48dbfb', // blue
            '#1dd1a1', // green
            '#5f27cd'  // purple
        ];

        function initBricks() {
            bricks = [];
            for (let r = 0; r < brickConfig.rows; r++) {
                bricks[r] = [];
                for (let c = 0; c < brickConfig.cols; c++) {
                    bricks[r][c] = {
                        x: c * (brickConfig.width + brickConfig.padding) + brickConfig.offsetLeft,
                        y: r * (brickConfig.height + brickConfig.padding) + brickConfig.offsetTop,
                        status: 1,
                        color: brickColors[r % brickColors.length],
                        points: (brickConfig.rows - r) * 10
                    };
                }
            }
        }

        function drawPaddle() {
            ctx.fillStyle = '#00d2d3';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            // Add shine effect
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, 5);
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.closePath();

            // Glow effect
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius + 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let r = 0; r < brickConfig.rows; r++) {
                for (let c = 0; c < brickConfig.cols; c++) {
                    const brick = bricks[r][c];
                    if (brick.status === 1) {
                        ctx.fillStyle = brick.color;
                        ctx.fillRect(brick.x, brick.y, brickConfig.width, brickConfig.height);

                        // Add shine
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fillRect(brick.x, brick.y, brickConfig.width, brickConfig.height / 3);

                        // Border
                        ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                        ctx.strokeRect(brick.x, brick.y, brickConfig.width, brickConfig.height);
                    }
                }
            }
        }

        function collisionDetection() {
            for (let r = 0; r < brickConfig.rows; r++) {
                for (let c = 0; c < brickConfig.cols; c++) {
                    const brick = bricks[r][c];
                    if (brick.status === 1) {
                        if (ball.x + ball.radius > brick.x &&
                            ball.x - ball.radius < brick.x + brickConfig.width &&
                            ball.y + ball.radius > brick.y &&
                            ball.y - ball.radius < brick.y + brickConfig.height) {

                            ball.dy = -ball.dy;
                            brick.status = 0;
                            score += brick.points;
                            updateStats();

                            // Check win
                            if (checkWin()) {
                                levelUp();
                            }
                        }
                    }
                }
            }
        }

        function checkWin() {
            for (let r = 0; r < brickConfig.rows; r++) {
                for (let c = 0; c < brickConfig.cols; c++) {
                    if (bricks[r][c].status === 1) {
                        return false;
                    }
                }
            }
            return true;
        }

        function levelUp() {
            level++;
            updateStats();
            ball.speed += 0.5;
            resetBall();
            initBricks();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
        }

        function resetBall() {
            ball.x = paddle.x + paddle.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = -ball.speed;
        }

        function movePaddle() {
            if (keys.ArrowLeft || keys.a) {
                paddle.dx = -paddle.speed;
            } else if (keys.ArrowRight || keys.d) {
                paddle.dx = paddle.speed;
            } else {
                paddle.dx = 0;
            }

            paddle.x += paddle.dx;

            // Boundary check
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        }

        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Paddle collision
            if (ball.y + ball.radius > paddle.y &&
                ball.y - ball.radius < paddle.y + paddle.height &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {

                // Calculate hit position for angle variation
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = (hitPos - 0.5) * 8;
                ball.dy = -Math.abs(ball.dy);

                // Increase speed slightly
                ball.speed = Math.min(ball.speed + 0.1, 10);
                const speedRatio = ball.speed / Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                ball.dx *= speedRatio;
                ball.dy *= speedRatio;
            }

            // Bottom - lose life
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                updateStats();
                if (lives <= 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }
        }

        function gameLoop() {
            if (gameState !== 'playing') return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            movePaddle();
            moveBall();
            collisionDetection();

            drawBricks();
            drawPaddle();
            drawBall();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (gameState === 'waiting' || gameState === 'paused' || gameState === 'gameover') {
                gameState = 'playing';
                document.getElementById('gameOver').style.display = 'none';
                resetBall();
                gameLoop();
            }
        }

        function pauseGame() {
            if (gameState === 'playing') {
                gameState = 'paused';
            }
        }

        function resetGame() {
            score = 0;
            lives = 3;
            level = 1;
            ball.speed = 5;
            gameState = 'waiting';
            paddle.x = canvas.width / 2 - 50;
            initBricks();
            resetBall();
            updateStats();
            document.getElementById('gameOver').style.display = 'none';

            // Draw initial state
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawPaddle();
            drawBall();
        }

        function gameOver() {
            gameState = 'gameover';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('gameOverTitle').textContent = score >= 1000 ? '恭喜通关！' : '游戏结束';
        }

        // Keyboard controls
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' && gameState === 'waiting') {
                startGame();
                e.preventDefault();
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mouse control for paddle
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.width / 2;

            // Keep paddle in bounds
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        });

        // Initialize
        initBricks();
        resetBall();
        drawBricks();
        drawPaddle();
        drawBall();
        updateStats();
    </script>
</body>
</html>
